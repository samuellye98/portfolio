- modal: Modal-7
  id: Modal-7
  label: Modal-label-7
  name: COVID-19 SG Cluster Map
  summary: Web-app that displays the different clusters of COVID-19 in Singapore using Mapbox.
  link: https://samuellye98.github.io/covid19SGMapClient/
  github: https://github.com/samuellye98/covid19SGMapClient
  description:
    - I embarked on this project because there were no maps detailing where COVID-19 cases were detected in Singapore. I wanted Singaporeans to be able to easily visualize where the clusters were in order to take precautionary measures.
    - I built this web application using React, Node.js, and Mapbox. I also had to use the Node.js library, Cheerio, to conduct web scraping for the information on COVID-19 cases in Singapore. Finally, I used Github Pages to host the frontend of the application and the API using Heroku.
  image: covid19sg.png
  date: 2020
  skills: [Cheerio, Heroku, Javascript, Mapbox, Node.js, React]

